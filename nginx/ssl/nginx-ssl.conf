events {}

http {
  resolver 127.0.0.11 valid=30s ipv6=off;

  # Nice-to-haves
  tcp_nodelay on;
  client_max_body_size 20m;
  keepalive_requests 1000;
  server_tokens off;

  # ---- Cloudflare Real IP ----
  # Without these, $binary_remote_addr is the CF edge node IP, not the
  # end user's. Rate limiting then buckets all users behind one CF node.
  # Source: https://www.cloudflare.com/ips/
  set_real_ip_from 173.245.48.0/20;
  set_real_ip_from 103.21.244.0/22;
  set_real_ip_from 103.22.200.0/22;
  set_real_ip_from 103.31.4.0/22;
  set_real_ip_from 141.101.64.0/18;
  set_real_ip_from 108.162.192.0/18;
  set_real_ip_from 190.93.240.0/20;
  set_real_ip_from 188.114.96.0/20;
  set_real_ip_from 197.234.240.0/22;
  set_real_ip_from 198.41.128.0/17;
  set_real_ip_from 162.158.0.0/15;
  set_real_ip_from 104.16.0.0/13;
  set_real_ip_from 104.24.0.0/14;
  set_real_ip_from 172.64.0.0/13;
  set_real_ip_from 131.0.72.0/22;
  set_real_ip_from 2400:cb00::/32;
  set_real_ip_from 2606:4700::/32;
  set_real_ip_from 2803:f800::/32;
  set_real_ip_from 2405:b500::/32;
  set_real_ip_from 2405:8100::/32;
  set_real_ip_from 2a06:98c0::/29;
  set_real_ip_from 2c0f:f248::/32;
  real_ip_header CF-Connecting-IP;
  real_ip_recursive on;

  # ---- Performance ----
  tcp_nopush on;

  # ---- Gzip Compression ----
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 4;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml;

  # SvelteKit immutable assets are content-hashed — zero abuse risk, but a
  # single page load fetches 20-30 in parallel. Skip rate limiting for them.
  map $uri $limit_key {
    ~^/_app/immutable/ "";
    default            $binary_remote_addr;
  }

  # ---- Rate Limiting Zones ----
  limit_req_zone $limit_key zone=global:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
  limit_req_zone $binary_remote_addr zone=websocket:10m rate=10r/s;

  # Return 429 Too Many Requests instead of default 503
  limit_req_status 429;

  upstream user {
    zone user 64k;
    server user:8081 resolve;
    keepalive 16;
  }

  upstream chat {
    zone chat 64k;
    server chat:8082 resolve;
    keepalive 16;
  }

  upstream notification {
    zone notification 64k;
    server notification:8083 resolve;
    keepalive 16;
  }

  upstream frontend {
    zone frontend 64k;
    server frontend:3000 resolve;
    keepalive 16;
  }

  # HTTP server - redirect to HTTPS and handle Let's Encrypt challenges
  server {
    listen 8080;
    server_name chat.ctaprojects.xyz www.chat.ctaprojects.xyz;

    # ---- Global Rate Limit ----
    limit_req zone=global burst=60 nodelay;

    # Let's Encrypt ACME challenge location
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      allow all;
    }

    # All non-ACME HTTP traffic → HTTPS (no API routes over plain HTTP)
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS server
  server {
    listen 8443 ssl;
    http2 on;
    server_name chat.ctaprojects.xyz www.chat.ctaprojects.xyz;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/chat.ctaprojects.xyz-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.ctaprojects.xyz-0001/privkey.pem;

    # SSL settings for security
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS — 2 years, include subdomains, allow preload list submission
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP is handled by SvelteKit (with nonces for inline scripts) for frontend
    # and by Helmet.js for backend API services. Do NOT set CSP here in nginx
    # or it will conflict with SvelteKit's per-request nonces.

    # Fix redirects from internal port 8443 to external port 443
    # This prevents nginx from exposing internal ports in Location headers
    proxy_redirect https://$host:8443/ https://$host/;
    proxy_redirect http://$host:8443/ https://$host/;

    # Global proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header Connection "";

    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 3;

    # ---- Global Rate Limit ----
    limit_req zone=global burst=60 nodelay;

    # Health check
    location = /health {
      access_log off;
      default_type application/json;
      return 200 '{"status":"ok","service":"nginx-gateway","ssl":"enabled"}';
    }

    # API routes
    location /api/user/ {
      proxy_pass http://user/;
      proxy_request_buffering on;
    }

    # ---- Auth endpoints with stricter rate limiting ----
    location ~ ^/user/(register|login)$ {
      limit_req zone=auth burst=10 nodelay;
      rewrite ^/user/(.*)$ /$1 break;
      proxy_pass http://user;
      proxy_request_buffering on;
    }

    location /user/ {
      proxy_pass http://user/;
      proxy_request_buffering on;
    }

    # Health check for notification service (must be before prefix locations)
    location = /notifications/health {
      proxy_pass http://notification/health;
    }

    location /notification/ {
      proxy_pass http://notification/notifications/;
      proxy_request_buffering on;
    }

    location /notifications/ {
      proxy_pass http://notification/notifications/;
      proxy_request_buffering on;
    }

    # ---- Block public access to Prometheus /metrics endpoints ----
    # Prometheus scrapes these directly inside the Docker network.
    # They must never be reachable via the public nginx gateway.
    location = /metrics               { return 403; }
    location = /chat/metrics          { return 403; }
    location = /user/metrics          { return 403; }
    location = /notifications/metrics { return 403; }
    location = /notification/metrics  { return 403; }

    # Chat API routes - proxy to chat-service backend
    location /chat/ {
      proxy_pass http://chat/;
      proxy_request_buffering on;
    }

    # Socket.IO (WebSocket)
    location ~* ^/chat/socket\.io/ {
      # Rate limit WebSocket connection upgrades
      limit_req zone=websocket burst=20 nodelay;

      if ($request_method = OPTIONS) {
        return 204;
      }
      proxy_pass http://chat;
      proxy_request_buffering off;
      proxy_buffering off;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Cookie $http_cookie;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 1h;
      proxy_send_timeout 1h;
    }

    # Frontend (fallback)
    location / {
      proxy_pass http://frontend;
      # SvelteKit sends large Link: preload headers (fonts/css); default 4k
      # proxy buffers overflow -> 502 -> fallback page. Keep >= 32k.
      proxy_buffer_size 32k;
      proxy_buffers 8 32k;
      proxy_busy_buffers_size 64k;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_connect_timeout 2s;
      proxy_read_timeout 5s;
      proxy_intercept_errors on;
      error_page 502 503 504 = @frontend_unavailable;
    }

    location @frontend_unavailable {
      default_type application/json;
      return 503 '{"status":"unavailable","message":"API server running with HTTPS. Frontend not deployed. API endpoints: /api/user/*, /user/*, /chat/*, /notifications/*","health":"/health"}';
    }
  }

  # ---- n8n.ctaprojects.xyz ----
  upstream n8n_upstream {
    zone n8n 64k;
    server n8n:5678;
    keepalive 8;
  }

  # HTTP -> HTTPS redirect + ACME challenge for n8n
  server {
    listen 8080;
    server_name n8n.ctaprojects.xyz;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      allow all;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS server for n8n
  server {
    listen 8443 ssl;
    http2 on;
    server_name n8n.ctaprojects.xyz;

    ssl_certificate /etc/letsencrypt/live/n8n.ctaprojects.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.ctaprojects.xyz/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL_N8N:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    proxy_redirect https://$host:8443/ https://$host/;
    proxy_redirect http://$host:8443/ https://$host/;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;

    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    location = /healthz {
      proxy_pass http://n8n_upstream/healthz;
      access_log off;
    }

    # n8n real-time push — WebSocket, no rate limit, long timeouts, full headers
    location /rest/push {
      proxy_pass http://n8n_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port 443;
      proxy_set_header Cookie $http_cookie;
      proxy_read_timeout 1h;
      proxy_send_timeout 1h;
      proxy_buffering off;
    }

    # Strict rate limit on login endpoint (brute-force protection)
    location = /rest/login {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://n8n_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Cookie $http_cookie;
      proxy_buffering off;
    }

    # Static assets: content-hashed filenames — safe to cache for 1 year
    location /assets/ {
      proxy_pass http://n8n_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Connection "";
      proxy_buffering off;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    }

    # All other n8n traffic
    location / {
      limit_req zone=global burst=60 nodelay;
      proxy_pass http://n8n_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port 443;
      proxy_set_header Cookie $http_cookie;
      proxy_set_header Connection "";
      proxy_buffering off;
    }
  }

}
