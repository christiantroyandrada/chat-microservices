
---
name: ci
on:
  push:
  # Run on all branches except main and master
    branches-ignore: [main, master]
  # Also run on pull requests targeting main so the workflow can act as a PR status check
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, chat-service, notification-service]

    steps:
      - name: Checkout
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 22
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '${{ matrix.service }}/package-lock.json'

      - name: Build ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: |
          npm ci
          npm run build

      - name: Summary
        run: echo "${{ matrix.service }} build completed successfully"

  typescript-check:
    name: TypeScript Type Check
    needs: build
    # Reuse the repository's typecheck workflow
    uses: ./.github/workflows/typescript-check.yml

  unit-tests:
    name: Unit Tests (reusable)
    needs: typescript-check
    uses: ./.github/workflows/unit-tests.yml
    with:
      coverage: 'true'
    # Needed for reusable sonar workflow when coverage is enabled.
    secrets: inherit

  integration-tests:
    name: Integration Tests
    needs: unit-tests
    uses: ./.github/workflows/integration-tests.yml
