
---
name: ci
on:
  push:
  # Run on all branches except main and master
    branches-ignore: [main, master]
  # Also run on pull requests targeting main so the workflow can act as a PR status check
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, chat-service, notification-service]

    steps:
      - name: Checkout
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Use Node.js 22
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '${{ matrix.service }}/package-lock.json'

      - name: Build ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: |
          npm ci
          npm run build

      - name: Summary
        run: echo "${{ matrix.service }} build completed successfully"

  typescript-check:
    name: TypeScript Type Check
    needs: build
    # Reuse the repository's typecheck workflow
    uses: ./.github/workflows/typescript-check.yml

  unit-tests:
    name: Unit Tests (reusable)
    needs: typescript-check
    uses: ./.github/workflows/unit-tests.yml
    with:
      coverage: 'false'
    # No secrets required for feature-branch unit tests in this repo; add `secrets: inherit` if needed

  integration-tests:
    name: Integration Tests
    needs: unit-tests
    uses: ./.github/workflows/integration-tests.yml
