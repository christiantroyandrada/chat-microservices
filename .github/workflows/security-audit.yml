---
name: Security Audit

on:
  workflow_call:
  schedule:
    # Run weekly on Mondays at 9am UTC
    - cron: '0 9 * * 1'

# Workflow permissions (top-level). Required for SARIF upload to the Security tab.
permissions:
  contents: read
  security-events: write

jobs:

  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        service: [user-service, chat-service, notification-service]
      fail-fast: false

    steps:
      - name: Checkout code
        # Pinned to a specific commit SHA for supply-chain security (githubactions:S7637)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '${{ matrix.service }}/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci --ignore-scripts

      - name: Run npm audit
        working-directory: ${{ matrix.service }}
        run: |
          # Report high and critical vulnerabilities (non-blocking)
          npm audit --audit-level=high
        continue-on-error: true

      - name: Generate audit report (JSON)
        if: always()
        working-directory: ${{ matrix.service }}
        run: npm audit --json > audit-report-${{ matrix.service }}.json || true

      - name: Upload audit report
        if: always()
        # Pinned to a specific commit SHA for supply-chain security
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: audit-report-${{ matrix.service }}
          path: ${{ matrix.service }}/audit-report-${{ matrix.service }}.json
          retention-days: 30

  trivy-scan:
    name: Container Image Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        service: [user-service, chat-service, notification-service, nginx]
      fail-fast: false

    steps:
      - name: Checkout code
        # Pinned to a specific commit SHA for supply-chain security
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build Docker image
        run: |
          if [ "${{ matrix.service }}" = "nginx" ]; then
            docker build -t ${{ matrix.service }}:test -f nginx/Dockerfile nginx
          else
            docker build -t ${{ matrix.service }}:test ${{ matrix.service }}
          fi

      # Replaced setup-trivy (broken internal ref 75c4dc0f) with trivy-action v0.34.1
      # trivy-action handles Trivy installation + scanning in a single step
      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # v0.34.1
        with:
          image-ref: '${{ matrix.service }}:test'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.service }}.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        # Upload SARIF only for non-fork runs. Forked PRs do not have permission to call the
        # CodeQL API with the GITHUB_TOKEN and will fail with "Resource not accessible by integration".
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        # Pinned to codeql-action v4.32.2 for supply-chain security
        uses: github/codeql-action/upload-sarif@45cbd0c69e560cd9e7cd7f8c32362050c9b7ded2
        with:
          sarif_file: 'trivy-results-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'
        continue-on-error: true

      - name: Generate Trivy report (JSON)
        if: always()
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # v0.34.1
        with:
          image-ref: '${{ matrix.service }}:test'
          format: 'json'
          output: 'trivy-report-${{ matrix.service }}.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          skip-setup-trivy: true
        continue-on-error: true

      - name: Upload Trivy report
        if: always()
        # Pinned to a specific commit SHA for supply-chain security
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trivy-report-${{ matrix.service }}
          path: 'trivy-report-${{ matrix.service }}.json'
          retention-days: 30
