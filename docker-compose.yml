services:
  # Setup service - generates .env files from consolidated secrets before other services start
  # Automatically generates strong JWT secrets if missing or weak
  # Reads secrets directly from bind-mounted docker-secrets directory
  setup:
    image: node:22-bullseye-slim
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts:ro
      - ./docker-secrets:/app/docker-secrets:ro
      - ./user-service:/app/user-service
      - ./chat-service:/app/chat-service
      - ./notification-service:/app/notification-service
    command: sh -c "/app/scripts/generate-envs.sh --secrets-file=/app/docker-secrets/app_secrets"
    restart: "no"

  postgres:
    image: postgres:17.6-trixie
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${ADMIN_USERNAME}
      POSTGRES_PASSWORD: ${ADMIN_PASSWORD}
      POSTGRES_DB: chat_db
    depends_on:
      setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ADMIN_USERNAME} -d chat_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    expose:
      - "5672"
      - "15672"
    ports:
      - "127.0.0.1:15672:15672" # Management UI (localhost only)
    environment:
      RABBITMQ_DEFAULT_USER: ${ADMIN_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${ADMIN_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # Web UI for PostgreSQL - pgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8088:80" # visit http://localhost:8088 (bound to localhost only)
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${ADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/misc/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  user:
    build: ./user-service
    restart: always
    expose:
      - "8081"
    env_file:
      - ./user-service/.env
    environment:
      # build the URI from .env variables (keeps credentials out of the compose file itself)
      DATABASE_URL: postgresql://${ADMIN_USERNAME}:${ADMIN_PASSWORD}@postgres:5432/chat_db
      # For local development use 'development', for production deployment use 'production'
      NODE_ENV: development
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      # Run node directly (no shell) so distroless images without /bin/sh can run the check
      test: ["CMD", "/nodejs/bin/node", "-e", "const http=require('http'); const req=http.get('http://localhost:8081/health', res=>{process.exit(res.statusCode===200?0:1)}); req.on('error',()=>process.exit(1)); setTimeout(()=>process.exit(1),2000);"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  chat:
    build: ./chat-service
    restart: always
    expose:
      - "8082"
    env_file:
      - ./chat-service/.env
    environment:
      DATABASE_URL: postgresql://${ADMIN_USERNAME}:${ADMIN_PASSWORD}@postgres:5432/chat_db
      NODE_ENV: development
      USER_SERVICE_URL: http://user:8081
      REDIS_URL: redis://redis:6379
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "const http=require('http'); const req=http.get('http://localhost:8082/health', res=>{process.exit(res.statusCode===200?0:1)}); req.on('error',()=>process.exit(1)); setTimeout(()=>process.exit(1),2000);"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  notification:
    build: ./notification-service
    restart: always
    expose:
      - "8083"
    env_file:
      - ./notification-service/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${ADMIN_USERNAME}:${ADMIN_PASSWORD}@postgres:5432/chat_db
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "const http=require('http'); const req=http.get('http://localhost:8083/health', res=>{process.exit(res.statusCode===200?0:1)}); req.on('error',()=>process.exit(1)); setTimeout(()=>process.exit(1),2000);"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  frontend:
    # Frontend is built from sibling repo - use 'frontend' profile for local dev
    # VPS deployments use a pre-built image or separate frontend deployment
    profiles:
      - frontend
      - full
    build:
      context: ../chat-microservices-frontend
      dockerfile: Dockerfile
      # Default to development build (http://localhost URLs)
      # Override with docker-compose.prod.yml for production URLs
      args:
        BUILD_ENV: development
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      ORIGIN: http://localhost
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
    depends_on:
      user:
        condition: service_healthy
      chat:
        condition: service_healthy
      notification:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "const http=require('http'); const req=http.get('http://localhost:3000', res=>{process.exit(res.statusCode<500?0:1)}); req.on('error',()=>process.exit(1)); setTimeout(()=>process.exit(1),2000);"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    # Expose nginx on host port 80 and 443 (maps to container 8080 and 8443)
    # Port 443 is only used when SSL is configured on VPS
    ports:
      - "0.0.0.0:80:8080"
      - "0.0.0.0:443:8443"
    # Note: SSL certificate volumes are mounted conditionally via docker-compose.prod.yml
    # For local development, nginx runs HTTP-only (no volumes needed)
    # For production, use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
    depends_on:
      user:
        condition: service_healthy
      chat:
        condition: service_healthy
      notification:
        condition: service_healthy
      # Note: frontend dependency removed - frontend uses profile and may not be present on VPS
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ── Observability stack ────────────────────────────────────────────────────
  # Opt-in profile — does NOT start by default.
  # Start with:  docker compose --profile observability up -d
  # Access via SSH tunnel:
  #   ssh -L 3001:localhost:3001 -L 9090:localhost:9090 vps
  #   Grafana    → http://localhost:3001  (admin / ${GRAFANA_PASSWORD:-admin})
  #   Prometheus → http://localhost:9090
  # RAM budget: ~100 MB (Prometheus) + ~150 MB (Grafana) = ~250 MB total.
  # ──────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: [observability]
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"   # Localhost-only — access via SSH tunnel
    depends_on:
      user:
        condition: service_healthy
      chat:
        condition: service_healthy
      notification:
        condition: service_healthy
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  grafana:
    image: grafana/grafana:11.4.0
    profiles: [observability]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
      GF_INSTALL_PLUGINS: ''
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"   # Localhost-only — access via SSH tunnel
    depends_on:
      - prometheus
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

volumes:
  postgres-data:
  pgadmin-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
